{% extends 'base.html' %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">개발툴 관리</h1>
<p class="text-gray-500 mb-6">등록된 개발툴 목록입니다. 이름을 클릭하면 상세 페이지로 이동합니다.</p>

<table class="w-full bg-white rounded-xl shadow">
  <thead class="bg-gray-100">
    <tr>
      <th class="p-4 text-left">이름</th>
      <th class="p-4 text-left">분류</th>
      <th class="p-4 text-left">설명</th>
    </tr>
  </thead>
  <tbody>
    {% for devtool in devtools %}
    <tr class="border-t">
      <td class="p-4">
        <a href="{% url 'devtool_detail' devtool.pk %}" class="text-indigo-600 hover:underline font-semibold">
          {{ devtool.name }}
        </a>
      </td>
      <td class="p-4">{{ devtool.kind }}</td>
      <td class="p-4">{{ devtool.content }}</td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="3" class="p-4 text-center text-gray-400">등록된 개발툴이 없습니다.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
