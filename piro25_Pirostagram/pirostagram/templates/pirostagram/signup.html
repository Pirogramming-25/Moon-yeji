<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - Pirostagram</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'pirostagram/style.css' %}">
    <style>
        body { display: block; text-align: center; padding-top: 80px; }
        .auth-box { max-width: 360px; margin: 0 auto; background: #fff; padding: 32px; border-radius: 12px; border: 1px solid #e5e5e5; }
        .auth-box h1 { color: #4caf50; margin-bottom: 24px; }
        .auth-box input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .auth-box button { width: 100%; padding: 10px; background: #4caf50; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h1>Pirostagram</h1>
        <h2>회원가입</h2>

        {% if form.errors %}
            <p style="color:red;">입력을 다시 확인해주세요.</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">가입하기</button>
        </form>

        <p style="margin-top:16px;"><a href="{% url 'pirostagram:login' %}">이미 계정이 있으신가요? 로그인</a></p>
    </div>
</body>
</html>
