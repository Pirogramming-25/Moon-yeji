{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Django GPT</title>
    <link rel="stylesheet" href="{% static 'my_gpt/css/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'sentiment_page' %}" class="nav-link {% if request.resolver_match.url_name == 'sentiment_page' %}active{% endif %}">감정 분석</a>
        <a href="{% url 'summarize_page' %}" class="nav-link {% if request.resolver_match.url_name == 'summarize_page' %}active{% endif %}">문서 요약</a>
        <a href="{% url 'moderate_page' %}" class="nav-link {% if request.resolver_match.url_name == 'moderate_page' %}active{% endif %}">유해 표현 분석</a>

        <span class="nav-right">
            {% if user.is_authenticated %}
                {{ user.username }}님
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">로그아웃</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">로그인</a>
            {% endif %}
        </span>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'my_gpt/js/common.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
