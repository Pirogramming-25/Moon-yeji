<!DOCTYPE html>
<html>
<head>
    <title>삭제 확인</title>
</head>
<body>
    <h1>정말 삭제하시겠습니까?</h1>
    <p>"{{ review.title }}"을(를) 삭제합니다.</p>

    </form>
</body>
</html>
