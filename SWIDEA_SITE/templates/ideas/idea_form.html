{% extends 'base.html' %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">아이디어 등록</h1>
<p class="text-gray-500 mb-6">아이디어 정보를 입력하고 등록해주세요.</p>

<form method="POST" enctype="multipart/form-data" class="bg-white p-8 rounded-xl shadow flex flex-col gap-4">
  {% csrf_token %}
  <div>
    <label class="block text-sm font-semibold mb-1">아이디어명</label>
    <input type="text" name="title" class="border rounded w-full p-2" required>
  </div>
  <div>
    <label class="block text-sm font-semibold mb-1">이미지</label>
    <input type="file" name="image" class="border rounded w-full p-2">
  </div>
  <div>
    <label class="block text-sm font-semibold mb-1">아이디어 설명</label>
    <textarea name="content" rows="4" class="border rounded w-full p-2" required></textarea>
  </div>
  <div>
    <label class="block text-sm font-semibold mb-1">아이디어 관심도</label>
    <input type="number" name="interest" value="0" class="border rounded w-full p-2">
  </div>
  <div>
    <label class="block text-sm font-semibold mb-1">해당 개발툴</label>
    <select name="devtool" class="border rounded w-full p-2">
      {% for devtool in devtools %}
      <option value="{{ devtool.pk }}">{{ devtool.name }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="bg-indigo-500 hover:bg-indigo-600 text-white py-2 rounded font-semibold">SUBMIT</button>
</form>
{% endblock %}
